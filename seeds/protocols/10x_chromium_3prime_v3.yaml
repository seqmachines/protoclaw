slug: 10x-chromium-3prime-v3
name: "10x Chromium 3' Gene Expression v3"
version: "v3"
assay_family: scRNA-seq
molecule_type: RNA
description: >-
  Droplet-based single-cell RNA-seq using the 10x Genomics Chromium platform
  with 3' gene expression v3 chemistry. Captures polyadenylated mRNA from
  individual cells partitioned into gel beads in emulsion (GEMs).
vendor: 10x Genomics
platform: Illumina
chemistry_version: "v3.1"
compatible_instruments:
  - Illumina NextSeq
  - Illumina NovaSeq
  - Illumina MiSeq
custom_primer_required: false
strand_orientation_notes: >-
  Read 1 captures the synthetic barcode and UMI cassette. Read 2 captures the
  cDNA insert after standard Illumina sequencing orientation.

read_geometry:
  read_type: paired-end
  read1_length: 28
  read2_length: 91
  index1_length: 8
  segments:
    - role: cell_barcode
      read_number: 1
      start_pos: 0
      length: 16
    - role: umi
      read_number: 1
      start_pos: 16
      length: 12
    - role: cdna
      read_number: 2
      start_pos: 0
      length: 91
    - role: sample_index
      read_number: 3
      start_pos: 0
      length: 8

adapters:
  - name: TruSeq Read 1
    sequence: CTACACGACGCTCTTCCGATCT
    position: "5prime"
  - name: Partial P5
    sequence: AATGATACGGCGACCACCGAGATCTACACTCTTTCCCTACACGACGCTCTTCCGATCT
    position: "5prime"

barcodes:
  - role: cell_barcode
    length: 16
    whitelist_source: 3M-february-2018.txt.gz
    addition_method: ligation
  - role: umi
    length: 12
    addition_method: ligation

reagent_kits:
  - name: Chromium Next GEM Single Cell 3' Kit v3.1
    vendor: 10x Genomics
    catalog_number: PN-1000269
    version: "v3.1"

protocol_steps:
  - GEM generation and barcoding
  - Post GEM-RT cleanup and cDNA amplification
  - 3' gene expression library construction
  - Sequencing on Illumina platform

protocol_timeline:
  - step_id: gem-generation
    title: GEM generation
    summary: Cells are partitioned with gel beads that introduce the cell barcode, UMI, and capture oligo.
    introduced_segment_ids:
      - seg-3-cell-barcode
      - seg-4-umi
      - seg-5-poly-dt
  - step_id: reverse-transcription
    title: Barcoding / RT
    summary: Polyadenylated RNA is reverse transcribed into cDNA inside GEMs.
    introduced_segment_ids:
      - seg-6-insert
    modified_segment_ids:
      - seg-5-poly-dt
  - step_id: library-construction
    title: Adapter ligation
    summary: The amplified cDNA is converted into a sequencing-compatible library.
    introduced_segment_ids:
      - seg-1-p5
      - seg-2-read-1-primer
      - seg-8-p7
  - step_id: sample-index-pcr
    title: Sample index PCR
    summary: Sample indices are added during final amplification to create a sequencing-ready library.
    introduced_segment_ids:
      - seg-7-i7
    modified_segment_ids:
      - seg-1-p5
      - seg-8-p7

qc_expectations:
  - metric: reads_per_cell
    typical_range_low: 20000
    typical_range_high: 50000
  - metric: genes_per_cell
    typical_range_low: 500
    typical_range_high: 5000
  - metric: valid_barcodes_fraction
    typical_range_low: 0.95
    typical_range_high: 0.99

failure_modes:
  - description: Low cell recovery
    symptom: Fewer than expected barcodes in knee plot
    likely_cause: Clogged microfluidic chip or incorrect cell concentration
    mitigation: Ensure proper cell concentration (700-1200 cells/uL)
  - description: High ambient RNA
    symptom: Elevated background gene expression across all barcodes
    likely_cause: Cell lysis before GEM generation
    mitigation: Minimize time between cell preparation and loading

citations:
  - title: "Massively parallel digital transcriptional profiling of single cells"
    doi: "10.1038/ncomms14049"
    authors: ["Zheng GXY", "Terry JM", "Belgrader P"]
    year: 2017

source_urls:
  - https://www.10xgenomics.com/support/single-cell-gene-expression

library_structure:
  - type: p5
    top: AATGATACGGCGACCACCGA
    bottom: TT ACTATGCCGCTGGTGGCT
    label: P5
  - type: r1_primer
    top: CTACACGACGCTCTTCCGATCT
    bottom: GATGTGCTGCGAGAAGGCTAGA
    label: Read 1 primer
  - type: cbc
    top: NNNNNNNNNNNNNNNN
    bottom: ................
    label: Cell barcode
  - type: umi
    top: NNNNNNNNNNNN
    bottom: ............
    label: UMI
  - type: poly_dt
    top: TTTTTTTTTTTTTTTTTTTTTTTTTTTVN
    bottom: ..............................
    label: Poly(dT)
  - type: cdna
    top: cDNA insert
    bottom: ...........
    label: Insert
  - type: i7
    top: NNNNNNNN
    bottom: ........
    label: i7
  - type: p7
    top: CAAGCAGAAGACGGCATACGA
    bottom: GTTCGTCTTCTGCCGTATGCT
    label: P7

